server:
  port: 8082

spring:
  application:
    name: tienda
  config:
    activate:
      on-profile: dev

  datasource:
    url: jdbc:h2:mem:tienda;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password: ''
  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: true
    open-in-view: false

#  graphql:
#    path: /graphql
#    graphiql:
#      enabled: true
#    cors:
#      allowed-origins: "*"
#      allowed-methods: GET,POST
#      allowed-headers: "*"

logging:
  level:
    root: INFO
    org.springframework: INFO
    org.springframework.graphql: DEBUG
    com.essenza.tienda: DEBUG
