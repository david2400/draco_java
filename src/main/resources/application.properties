server.port=8082
 
 # MySQL datasource (Docker compose: mysql:5.7 on localhost:3306)
 spring.datasource.url=jdbc:mysql://localhost:3306/storeweb?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
 spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
 spring.datasource.username=root
 spring.datasource.password=Simonsito123
 
 # JPA
 
#  spring.jpa.hibernate.ddl-auto=update
 spring.jpa.show-sql=true
 spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
 
spring.flyway.enabled=false
spring.flyway.baseline-on-migrate=true
spring.flyway.schemas=storeweb
spring.flyway.baseline-version=0
 
# JWT: usa un secreto de 32+ bytes
security.jwt.secret=change-this-secret-to-a-very-long-random-string-32b-min

# GraphQL
#spring.graphql.path=/graphql
# Habilitar la consola GraphiQL integrada
#spring.graphql.graphiql.enabled=true
# Usar CDN para assets de GraphiQL y evitar issues con webjars
#spring.graphql.graphiql.cdn.enabled=false
# CORS básico para GraphQL (ajusta orígenes según tu frontend)
#spring.graphql.cors.allowed-origins=*
#spring.graphql.cors.allowed-methods=GET,POST,OPTIONS
#spring.graphql.cors.allowed-headers=*
spring.docker.compose.enabled=false

# Logging detallado para diagnosticar GraphQL fuera del perfil dev
#logging.level.org.springframework.graphql=DEBUG
logging.level.com.essenza.tienda=DEBUG

spring.jackson.property-naming-strategy=SNAKE_CASE
springdoc.model-converters.property-naming-strategy=SNAKE_CASE

logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.tool.schema=ERROR
