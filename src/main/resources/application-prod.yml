spring:
  datasource:
    url: jdbc:mysql://localhost:3306/tienda?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: tienda
    password: ${DB_PASSWORD:tienda}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
  cache:
    type: caffeine
    cache-names: products, users, warehouses
server:
  port: 8080
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,env,loggers,threaddump
  endpoint:
    health:
      show-details: when_authorized
logging:
  level:
    root: INFO
    com.essenza.tienda: INFO
